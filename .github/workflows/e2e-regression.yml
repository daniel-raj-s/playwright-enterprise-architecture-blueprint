name: E2E Regression CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      HOME: /root
    
    # Run tests inside Playwright's official Docker container for environment parity
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3] # Shards E2E test execution across 3 parallel runners

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Playwright browsers and system dependencies are pre-installed in the Docker image, so we skip browser downloads
    
    - name: Run Playwright Tests (Sharded E2E Regression)
      run: npm run test:e2e -- --shard=${{ matrix.shard }}/3

    - name: Upload Playwright Shard Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-regression-report-shard-${{ matrix.shard }}-of-3
        path: |
          playwright-report/
          allure-results/
          test-results/
        retention-days: 14
